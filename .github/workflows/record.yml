name: record-session
on:
  repository_dispatch:
    types: [start-recording, stop-recording]

jobs:
  record:
    runs-on: ubuntu-latest
    if: github.event.action == 'start-recording'
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2t64 libatk1.0-0 ...

      - name: Install dependencies
        run: npm install

      - name: Run recorder
        env:
          # These MUST match the Supabase project where edge functions are deployed.
          # The dispatch payload also sends backend_url and app_base_url as overrides.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ROOM_NAME: ${{ github.event.client_payload.room_name }}
          RECORDING_ID: ${{ github.event.client_payload.recording_id }}
          # Use values from dispatch payload (sent by manage-recording edge function)
          BACKEND_URL: ${{ github.event.client_payload.backend_url }}
          APP_BASE_URL: ${{ github.event.client_payload.app_base_url }}
        run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" node record-script.js
