name: record-session

on:
  repository_dispatch:
    types:
      - start-recording
      - stop-recording

jobs:
  record:
    if: github.event.action == 'start-recording'
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Chrome for Puppeteer
        run: npx puppeteer browsers install chrome

      - name: Record session
        run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" node record-script.js
        env:
          ROOM_NAME: ${{ github.event.client_payload.room_name }}
          RECORDING_ID: ${{ github.event.client_payload.recording_id }}
          APP_BASE_URL: ${{ github.event.client_payload.app_base_url }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
