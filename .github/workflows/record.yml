name: Record Classroom

on:
  repository_dispatch:
    types: [start-recording, stop-recording]

jobs:
  record:
    if: github.event_name == 'repository_dispatch' && (github.event.action == 'start-recording' || github.event_type == 'start-recording')
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Debug event
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Event type: ${{ github.event_type }}"
          echo "Event action: ${{ github.event.action }}"
          echo "Payload keys: $(echo '${{ toJson(github.event.client_payload) }}' | jq -r 'keys[]' 2>/dev/null || echo 'No payload or jq not available')"

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev wget gnupg xvfb libxss1 libasound2t64

      - name: Install Node Dependencies
        run: npm install
          
      - name: Run recorder
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_API_KEY }}
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
          LIVEKIT_URL: ${{ secrets.LIVEKIT_URL }}
          APP_BASE_URL: ${{ github.event.client_payload.app_base_url }}
          ROOM_NAME: ${{ github.event.client_payload.room_name }}
          RECORDING_ID: ${{ github.event.client_payload.recording_id }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET: ${{ secrets.AWS_BUCKET_NAME }}
          S3_REGION: ${{ secrets.S3_REGION }}
        run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" node record-script.js

  stop:
    if: github.event_name == 'repository_dispatch' && (github.event.action == 'stop-recording' || github.event_type == 'stop-recording')
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Debug event
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Event type: ${{ github.event_type }}"
          echo "Event action: ${{ github.event.action }}"
          echo "Payload keys: $(echo '${{ toJson(github.event.client_payload) }}' | jq -r 'keys[]' 2>/dev/null || echo 'No payload or jq not available')"

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node Dependencies
        run: npm install

      - name: Stop recording
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RECORDING_ID: ${{ github.event.client_payload.recording_id }}
        run: |
          node -e "
          const { createClient } = require('@supabase/supabase-js');
          async function stop() {
            if (!process.env.RECORDING_ID) {
              console.error('Missing RECORDING_ID in payload');
              process.exit(1);
            }
            const supabase = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_SERVICE_KEY);
            const { error } = await supabase.from('class_recordings').update({ status: 'stopping' }).eq('id', process.env.RECORDING_ID);
            if (error) {
              console.error('Failed to update recording status:', error);
              process.exit(1);
            }
            console.log('Recording status set to stopping');
          }
          stop();
          "
